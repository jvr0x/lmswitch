# Example lmswitch config for a GGUF model served by llama-server.
# Copy into ai-models/<name>.yaml — the filename (minus .yaml) is the model id.
runtime: llama                                       # "llama" = llama-server (GGUF); default if omitted
model: "unsloth/Qwen3-4B-GGUF/Qwen3-4B-Q4_K_M.gguf"  # path relative to MODELS_DIR (~/models by default)
port: 8085                                           # OpenAI-compatible server port
ctx: 65536                                           # context length (--ctx-size)
display_name: "Qwen3-4B"                             # label shown in the table and in opencode

# --- optional (defaults shown) ---
# ready_timeout: 300                                 # seconds to wait for readiness (llama default 300)
# force: false                                       # set true to bypass the pre-load RAM guard
# gpu_layers: 99                                     # --n-gpu-layers (99 = offload all layers)
# threads: 12                                        # CPU threads
# batch: 1024                                        # --batch-size
# ubatch: 512                                        # --ubatch-size
# fit: off                                           # auto memory-fit; "off" (default) skips the step
#                                                    #   that aborts on some CUDA builds (e.g. GB10);
#                                                    #   use "none" to omit -fit on older llama.cpp builds
# alias: qwen3-4b                                    # --alias (defaults to the model id)
# mmproj: "path/to/mmproj.gguf"                      # multimodal projector, relative to MODELS_DIR
# llama_bin: "/path/to/llama-server"                 # defaults to ../llama.cpp/build/bin/llama-server
# restart: on-failure                                # opt into systemd-managed auto-restart
#
# extra_args — pass ANY other llama-server flag verbatim (appended last, so it
# can override the defaults above). See: llama-server --help. List or string:
# extra_args: ["-fa", "on", "-ctk", "q8_0", "-ctv", "q8_0"]
# extra_args: "--temp 0.7 --top-p 0.9 --jinja"
